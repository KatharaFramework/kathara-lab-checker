convergence_time: 20
default_image: kathara/base
structure: lab.conf

lab_inline: |
  r1[0]="A"
  r2[0]="A"
  r5[0]="B"
  r3[0]="B"
  r6[0]="C"
  r4[0]="C"
  r2[1]="D"
  r3[1]="D"
  r2[2]="E"
  r4[1]="E"
  r3[2]="F"
  r4[2]="F"

test:
  requiring_startup:
    - r1
    - r2
    - r3
    - r4
    - r5
    - r6

  ip_mapping:
    r1:
      lo: "2001:db8:1::1/128"
      eth0: "2001:db8:12::1/64"

    r2:
      lo: "2001:db8:1::2/128"
      eth0: "2001:db8:12::2/64"
      eth1: "2001:db8:23::2/64"
      eth2: "2001:db8:24::2/64"

    r3:
      lo: "2001:db8:1::3/128"
      eth0: "2001:db8:35::3/64"
      eth1: "2001:db8:23::3/64"
      eth2: "2001:db8:34::3/64"

    r4:
      lo: "2001:db8:1::4/128"
      eth0: "2001:db8:46::4/64"
      eth1: "2001:db8:24::4/64"
      eth2: "2001:db8:34::4/64"

    r5:
      lo: "2001:db8:1::5/128"
      eth0: "2001:db8:35::5/64"

    r6:
      lo: "2001:db8:1::6/128"
      eth0: "2001:db8:46::6/64"

  daemons:
    r1:
      - bgpd
    r2:
      - bgpd
    r3:
      - bgpd
    r4:
      - bgpd
    r5:
      - bgpd
    r6:
      - bgpd

  # Using the optional "address_family: ipv6" field
  protocols:
    bgpd:
      neighbors:
        r1:
          - ip: "2001:db8:12::2"
            asn: 1
            address_family: ipv6

        r2:
          - ip: "2001:db8:12::1"
            asn: 2
            address_family: ipv6
          - ip: "2001:db8:23::3"
            asn: 1
            address_family: ipv6
          - ip: "2001:db8:24::4"
            asn: 1
            address_family: ipv6

        r3:
          - ip: "2001:db8:35::5"
            asn: 3
            address_family: ipv6
          - ip: "2001:db8:23::2"
            asn: 1
            address_family: ipv6
          - ip: "2001:db8:34::4"
            asn: 1
            address_family: ipv6

        r4:
          - ip: "2001:db8:46::6"
            asn: 4
            address_family: ipv6
          - ip: "2001:db8:24::2"
            asn: 1
            address_family: ipv6
          - ip: "2001:db8:34::3"
            asn: 1
            address_family: ipv6

        r5:
          - ip: "2001:db8:35::3"
            asn: 1
            address_family: ipv6

        r6:
          - ip: "2001:db8:46::4"
            asn: 1
            address_family: ipv6

      networks:
        r1:
          - "2001:db8:1::1/128"
        r2:
          - "2001:db8:1::2/128"
        r3:
          - "2001:db8:1::3/128"
        r4:
          - "2001:db8:1::4/128"
        r5:
          - "2001:db8:1::5/128"
        r6:
          - "2001:db8:1::6/128"