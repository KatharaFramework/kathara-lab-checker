frr version 8.4
frr defaults traditional
hostname r4
service integrated-vtysh-config
ipv6 forwarding

router bgp 1
 bgp router-id 4.4.4.4
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast

 neighbor 2001:db8:46::6 remote-as 4
 neighbor 2001:db8:24::2 remote-as 1
 neighbor 2001:db8:34::3 remote-as 1

 address-family ipv6 unicast
  network 2001:db8:1::4/128
  neighbor 2001:db8:46::6 activate
  neighbor 2001:db8:24::2 activate
  neighbor 2001:db8:34::3 activate
  neighbor 2001:db8:46::6 next-hop-self
  neighbor 2001:db8:24::2 next-hop-self
  neighbor 2001:db8:34::3 next-hop-self
 exit-address-family

line vty